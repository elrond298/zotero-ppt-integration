<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Zotero Citations</title>
		<!-- Office.js MUST be loaded for Office.onReady to work -->
		<script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
		<link rel="stylesheet" href="taskpane.css" />
	</head>
		<body data-theme="auto">
			<h1>Zotero Citations</h1>
			<div id="status" class="status" aria-live="polite">Checking Zotero connection...</div>
			<div class="actions">
				<button id="add-citation" class="ms-Button primary">
					<span class="ms-Button-label">Add Citation (Pop up)</span>
				</button>
				<button id="add-citation-selected" class="ms-Button secondary">
					<span class="ms-Button-label">Add Citation (Selected)</span>
				</button>
				<label class="control-field" for="bibliography-style">
					<span class="control-label">Bibliography Style</span>
					<select id="bibliography-style" class="control-select">
						<option value="journal-of-geophysical-research-atmospheres">Journal of Geophysical Research: Atmospheres</option>
						<option value="apa">APA</option>
						<option value="chicago-author-date">Chicago Author-Date</option>
						<option value="ieee">IEEE</option>
						<option value="modern-language-association">MLA</option>
					</select>
				</label>
				<button id="generate-bibliography" class="ms-Button accent">
					<span class="ms-Button-label">Generate Bibliography</span>
				</button>
			</div>
			<div id="output" aria-live="polite"></div>
	</body>
</html>
